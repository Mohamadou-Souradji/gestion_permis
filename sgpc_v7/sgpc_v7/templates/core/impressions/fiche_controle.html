{% load core_extras %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiche contrôle — {{ candidat.numero_dossier }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Times New Roman', Times, serif; background: #eee; padding: 20px; }
    .toolbar { max-width: 210mm; margin: 0 auto 12px; display: flex; justify-content: flex-end; gap: 8px; }
    .toolbar button, .toolbar a { font-family: Arial, sans-serif; font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 5px; border: 1px solid #ccc; background: #fff; cursor: pointer; text-decoration: none; color: #111; }
    .toolbar .btn-print { background: #111; color: #fff; border-color: #111; }
    .page { width: 210mm; min-height: 297mm; margin: 0 auto; background: white; position: relative; box-shadow: 0 0 8px rgba(0,0,0,.15); }
    .champ { position: absolute; font-weight: 700; white-space: nowrap; letter-spacing: 0.3px; }
    .info { max-width: 210mm; margin: 0 auto 12px; background: #fffbeb; border: 1px solid #fde68a; padding: 10px 14px; font-size: 11px; color: #92400e; border-radius: 4px; font-family: Arial, sans-serif; }
    @media print {
      body { background: white; padding: 0; }
      .toolbar, .info { display: none; }
      .page { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="info">Insérez le papier pré-imprimé "Permis de Conduire — Contrôle" avant d'imprimer.</div>
  <div class="toolbar">
    <a href="javascript:history.back()">← Retour</a>
    <button class="btn-print" onclick="window.print()">Imprimer</button>
  </div>
  <div class="page">
    {% for p in positions %}
      <div class="champ" style="left: {{ p.x_mm }}mm; top: {{ p.y_mm }}mm; font-size: {{ p.taille_police }}pt;">
        {{ valeurs|get_item:p.champ }}
      </div>
    {% endfor %}
  </div>
</body>
</html>
