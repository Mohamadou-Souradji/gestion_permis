<!DOCTYPE html>
<html lang="fr" class="h-full bg-gray-50/50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — SGPC</title>
  {% load static %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="h-full flex flex-col justify-center py-12 sm:px-6 lg:px-8 text-gray-800 antialiased">

  <div class="sm:mx-auto sm:w-full sm:max-w-md px-4 sm:px-0">
    <div class="flex flex-col items-center text-center mb-8">
      <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-md shadow-blue-500/20 mb-4 transition-transform hover:scale-105 duration-200">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="1" y="3" width="15" height="13" rx="2"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 8h4l3 3v5h-7V8z"/>
          <circle cx="5.5" cy="18.5" r="2.5"/>
          <circle cx="18.5" cy="18.5" r="2.5"/>
        </svg>
      </div>
      <p class="text-xs font-medium text-gray-500 mt-1 uppercase tracking-wider">Système de Gestion des Permis de Conduire — Niger</p>
    </div>

    {% if messages %}
      <div class="space-y-2 mb-4">
        {% for msg in messages %}
          <div class="flex items-center gap-2 p-3 text-sm font-medium bg-rose-50 text-rose-700 border border-rose-100 rounded-xl shadow-sm">
            <svg class="w-4 h-4 shrink-0 text-rose-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            <span>{{ msg }}</span>
          </div>
        {% endfor %}
      </div>
    {% endif %}

    <div class="bg-white rounded-2xl border-2 border-gray-200 shadow-md p-6 sm:p-8">
      <h2 class="text-lg font-bold text-gray-900 mb-6">Connexion à votre espace</h2>
      
      <form method="post" class="space-y-5">
        {% csrf_token %}
        
        <div class="flex flex-col gap-1.5">
          <label for="username" class="text-xs font-semibold text-gray-600">Identifiant</label>
          <div class="relative">
            <input 
              type="text" 
              id="username" 
              name="username"
              placeholder="Votre identifiant"
              autocomplete="username" 
              required 
              autofocus
              class="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 text-sm rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all pl-10"
            >
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </div>
          </div>
        </div>
        
        <div class="flex flex-col gap-1.5">
          <label for="password" class="text-xs font-semibold text-gray-600">Mot de passe</label>
          <div class="relative">
            <input 
              type="password" 
              id="password" 
              name="password"
              placeholder="••••••••"
              autocomplete="current-password" 
              required
              class="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 text-sm rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all pl-10"
            >
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
            </div>
          </div>
        </div>

        <div class="pt-2">
          <button type="submit" class="w-full inline-flex items-center justify-center gap-2 text-sm font-semibold px-5 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 active:bg-blue-800 transition shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
            </svg>
            Accéder au système
          </button>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
