<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test impression — {{ label }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Times New Roman', Times, serif; background: #eee; padding: 20px; }
    .toolbar { max-width: 210mm; margin: 0 auto 14px; display: flex; justify-content: space-between; align-items: center; }
    .toolbar a, .toolbar button { font-family: Arial, sans-serif; font-size: 12px; font-weight: 600; padding: 7px 14px; border-radius: 6px; border: 1px solid #ccc; background: #fff; cursor: pointer; text-decoration: none; color: #111; }
    .toolbar .imprimer { background: #111; color: #fff; border-color: #111; }
    .info { max-width: 210mm; margin: 0 auto 14px; background: #fffbeb; border: 1px solid #fde68a; padding: 10px 14px; font-size: 12px; color: #92400e; border-radius: 6px; font-family: Arial, sans-serif; }
    .page {
      width: 210mm; min-height: 297mm; margin: 0 auto;
      background: white; position: relative;
      box-shadow: 0 0 8px rgba(0,0,0,.15);
    }
    .champ-test {
      position: absolute;
      font-weight: 700;
      white-space: nowrap;
    }
    @media print {
      body { background: white; padding: 0; }
      .toolbar, .info { display: none; }
      .page { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="info">
    Ceci reproduit exactement les positions configurées. Insérez le papier pré-imprimé dans l'imprimante puis cliquez "Imprimer".
  </div>
  <div class="toolbar">
    <a href="{% url 'editeur_position' type_fiche %}">← Retour à l'éditeur</a>
    <button class="imprimer" onclick="window.print()">Imprimer le test</button>
  </div>
  <div class="page">
    {% for p in positions %}
    <div class="champ-test" style="left: {{ p.x_mm }}mm; top: {{ p.y_mm }}mm; font-size: {{ p.taille_police }}pt;">
      {{ p.label }} — exemple
    </div>
    {% endfor %}
  </div>
</body>
</html>
