{% extends 'core/base.html' %}
{% block title %}Nouvel agent{% endblock %}
{% block topbar_title %}Créer un compte agent{% endblock %}

{% block content %}
<div class="breadcrumb">
  <a href="{% url 'liste_agents' %}">Agents</a>
  <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  <span>Nouvel agent</span>
</div>
<div class="card" style="max-width:520px;">
  <div class="card-header"><span class="card-title">Informations du compte</span></div>
  <form method="post">
    {% csrf_token %}
    <div class="form-grid" style="margin-bottom:14px;">
      <div class="form-group">
        <label>Nom *</label>
        <input type="text" name="nom" required placeholder="NOM">
      </div>
      <div class="form-group">
        <label>Prénom *</label>
        <input type="text" name="prenom" required placeholder="Prénom">
      </div>
      <div class="form-group">
        <label>Identifiant *</label>
        <input type="text" name="username" required placeholder="login">
      </div>
      <div class="form-group">
        <label>Mot de passe *</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="email@example.com">
      </div>
      <div class="form-group">
        <label>Téléphone</label>
        <input type="tel" name="telephone" placeholder="90 00 00 00">
      </div>
      <div class="form-group" style="grid-column:1/-1;">
        <label>Rôle *</label>
        <select name="role" required>
          <option value="direction">Agent Direction</option>
          <option value="admin">Administrateur</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:10px;">
      <button type="submit" class="btn btn-primary">Créer le compte</button>
      <a href="{% url 'liste_agents' %}" class="btn btn-secondary">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
