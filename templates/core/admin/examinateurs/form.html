{% extends 'core/base.html' %}
{% block title %}Nouvel examinateur{% endblock %}
{% block topbar_title %}Créer un examinateur{% endblock %}
{% block content %}
<script src="https://cdn.tailwindcss.com"></script>
<div class="p-6 max-w-lg mx-auto text-gray-800 antialiased">
  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
    <div class="p-5 border-b border-gray-100 bg-gray-50/50">
      <h3 class="font-bold text-gray-900 text-xl">Nouvel examinateur</h3>
    </div>
    <form method="post" class="p-6 space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Nom *</label>
        <input type="text" name="nom" required placeholder="NOM" class="w-full px-3.5 py-2 bg-gray-50 border border-gray-200 text-sm rounded-xl focus:outline-none focus:border-blue-500">
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Prénom</label>
        <input type="text" name="prenom" placeholder="Prénom" class="w-full px-3.5 py-2 bg-gray-50 border border-gray-200 text-sm rounded-xl focus:outline-none focus:border-blue-500">
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Téléphone</label>
        <input type="tel" name="telephone" placeholder="90 00 00 00" class="w-full px-3.5 py-2 bg-gray-50 border border-gray-200 text-sm rounded-xl focus:outline-none focus:border-blue-500">
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" class="flex-1 text-sm font-semibold px-4 py-2.5 bg-gray-900 text-white rounded-xl hover:bg-gray-700 transition">Créer</button>
        <a href="{% url 'liste_examinateurs' %}" class="text-sm font-medium px-4 py-2.5 bg-white text-gray-700 border border-gray-200 rounded-xl hover:bg-gray-50 transition">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
